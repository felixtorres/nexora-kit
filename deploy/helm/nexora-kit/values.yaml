replicaCount: 1

image:
  repository: nexora-kit
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: nexora-kit.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# NexoraKit instance config
nexora:
  name: nexora-kit
  host: "0.0.0.0"
  port: 3000

  auth:
    type: api-key
    # Keys defined here or via existingSecret
    keys: []
    # Reference an existing Kubernetes secret with key "api-keys"
    existingSecret: ""

  storage:
    # "sqlite" or "postgres"
    backend: sqlite
    # SQLite settings (used when backend=sqlite)
    sqlitePath: /data/nexora.db
    # PostgreSQL settings (used when backend=postgres)
    postgresConnectionString: ""
    postgresPoolSize: 10

  plugins:
    directory: /app/instance/plugins

  rateLimit:
    enabled: false
    windowMs: 60000
    maxRequests: 100

  allowedOrigins: []
  maxBodyBytes: 1048576
  publicMetrics: false

# Persistent volume for SQLite data
persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 1Gi
  storageClass: ""

# Additional environment variables
env: []
