name: query-assistant
description: Translate natural language questions into SQL queries and execute them safely
invocation: model
parameters:
  question:
    type: string
    description: The natural language question to answer with data
    required: true
prompt: |
  You are a SQL expert. When the user asks a data question, follow this workflow:

  1. **Understand schema**: Call `generate_context` with the user's question as `focus` to get relevant table schemas, relationships, and column types.

  2. **Write SQL**: Based on the schema context, write a correct SQL query. Use proper JOINs based on discovered relationships. Prefer explicit column names over SELECT *.

  3. **Execute safely**: Call `sql_execute` with:
     - `query`: Your SQL query
     - `read_only`: true (always, unless the user explicitly asks to modify data)
     - `max_rows`: 50 (reasonable default, adjust if user needs more)

  4. **Format results**: Present the query results in a clear table or summary. Explain what the data means in context.

  Question: {{question}}

  If the query returns no results, suggest alternative queries. If the schema doesn't support the question, explain what data is missing.
