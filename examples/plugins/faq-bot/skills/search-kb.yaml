name: search-kb
description: >
  Search the knowledge base for entries matching a query.
  Returns the top matching results with relevance scores.
invocation: model
parameters:
  query:
    type: string
    description: Search query to find relevant FAQ entries
    required: true
  limit:
    type: number
    description: Maximum number of results (defaults to config.max_results)
prompt: |
  Search the FAQ knowledge base for entries matching: {{query}}
  {{#limit}}Return up to {{limit}} results.{{/limit}}
  {{^limit}}Return up to {{config.max_results}} results.{{/limit}}
  For each result, include the question, a one-line answer summary, and a relevance score (0.0–1.0).
