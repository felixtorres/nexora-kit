name: dashboard_app_create
description: >
  Build a dashboard app NOW. Call this tool immediately when the user asks for
  a dashboard, chart, visualization, or data analysis. Do not explain what you
  would build — call this tool and build it. The output is a live interactive
  HTML app with charts, KPIs, and tables.
invocation: model
parameters:
  title:
    type: string
    description: Short dashboard title
    required: true
  widgets:
    type: string
    description: >
      JSON array of widgets. Each needs id, type, title, size ({col,row,width,height}).
      Chart: add chartType + config (ECharts option). KPI: add valueField + format.
      Table: add columns array. All data widgets need query ({dataSourceId, sql}).
    required: true
  theme:
    type: string
    description: "'light', 'dark', or 'auto' (default: 'auto')"
