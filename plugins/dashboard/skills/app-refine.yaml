name: dashboard_app_refine
description: >
  Modify an existing dashboard app immediately. Call this when the user wants
  to change, add, or remove anything in a dashboard. Do not explain the change
  — apply it.
invocation: model
parameters:
  appId:
    type: string
    description: Artifact ID of the dashboard
    required: true
  definition:
    type: string
    description: Current AppDefinition JSON
    required: true
  refinementLevel:
    type: string
    description: "'layout' (no queries), 'dashboard' (full), or 'widget' (targeted)"
  addWidgets:
    type: string
    description: JSON array of new widgets
  removeWidgetIds:
    type: string
    description: JSON array of widget IDs to remove
  updateWidgets:
    type: string
    description: JSON array of partial widget updates (each needs 'id')
  title:
    type: string
    description: New title
  theme:
    type: string
    description: "'light', 'dark', or 'auto'"
